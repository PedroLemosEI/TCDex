<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="logo">TCDex</h1>
      <p class="tagline">Pokédex Tracker</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="trainer@example.com"
          autocomplete="email"
          [class.invalid]="form.get('email')!.invalid && form.get('email')!.touched"
        />
        @if (form.get('email')!.invalid && form.get('email')!.touched) {
          <span class="field-error">Enter a valid email address</span>
        }
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
          [class.invalid]="form.get('password')!.invalid && form.get('password')!.touched"
        />
        @if (form.get('password')!.invalid && form.get('password')!.touched) {
          <span class="field-error">Password must be at least 6 characters</span>
        }
      </div>

      @if (error()) {
        <div class="form-error">{{ error() }}</div>
      }

      <button type="submit" class="btn-primary submit-btn" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-link">
      No account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
